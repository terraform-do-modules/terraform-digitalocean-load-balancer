name: PR Validation

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  pr-validation:
    if: github.actor != 'dependabot[bot]'
    uses: clouddrove/github-shared-workflows/.github/workflows/pr_checks.yml@a26d1abb482f8615f50f54e3e5ca2b9ed0e349d4 # pinned to latest
    secrets: inherit
    with:
      subjectPattern: '^.+$'
